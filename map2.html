<!DOCTYPE html>
<html>

<head>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"/>  
    <meta charset="utf-8">
    <title>Earthquakes in Japan</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        /* the layout of the legend panel */
        #legend {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 180px;
            background: #fff;
            margin-right: 20px;
            margin-bottom: 40px;
            padding: 10px 20px 10px 0px;
            border-radius: 3px;
            text-align: center;
            font-family: 'Open Sans', sans-serif;
        }

        /* each line for a break */
        .break {
            position: relative;
            margin: 0px;
            padding: 0px;
        }

        /* basic style for a dot/circle */
        .dot {
            display: inline-block;
            margin-top: 5px;
            border-radius: 50%;
            opacity: 0.6;
        }

        /* the label for the dot */
        .dot-label {
            position: absolute;
            top: 0;
            right: 0;
            font-style: italic;
        }

        /* the text color of a hyper link */
        a {
            color: black
        }

        #title {
            position: absolute;
            top: 0;
            left: 0;
            margin-top: 20px;
            margin-left: 20px;
            font-family: 'Open Sans', sans-serif;
            font-size: 25pt;
            color: white
        }

        #subtitle {
            position: absolute;
            top: 0;
            left: 0;
            margin-top: 70px;
            margin-left: 190px;
            font-family: 'Open Sans', sans-serif;
            font-size: 15pt;
            color: white
        }
        
        
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="legend"></div>
    <div id="title">
        US Covid Cases
    </div>
    <div id="subtitle">
        2020
    </div>   
    <script>

        // map code
        mapboxgl.accessToken =
            'pk.eyJ1IjoiZWFudG9ueXVrIiwiYSI6ImNtbHNtYzlhbjA4MngzbW9veXJxMmhkczIifQ.MCnB2-Gf9cCru6KqHwbGnA';
        let map = new mapboxgl.Map({
            container: 'map', // container ID
            style: 'mapbox://styles/mapbox/dark-v10',
            projection: 'albers',
            zoom: 3, // starting zoom
            center: [-100, 40] // starting center
        });

        const cases = [10000, 50000, 115000, 315000, 600000], 
            colors = ['rgb(254,229,217)', 'rgb(252,174,145)', 'rgb(251,106,74)', 'rgb(222,45,38)', 'rgb(165,15,21)'], 
            radii = [1, 5, 12, 20, 35];

        map.on('load', () => {
            map.addSource('covid-counts', {
                type: 'geojson',
                data: 'assets/us-covid-2020-counts.geojson'
            });

            map.addLayer({
                'id': 'earthquakes-point',
                'type': 'circle',
                'source': 'covid-counts',
                'paint': {
                    'circle-radius': {
                        'property': 'cases',
                        'stops': [
                            [cases[0], radii[0]],
                            [cases[1], radii[1]],
                            [cases[2], radii[2]],
                            [cases[3], radii[3]],
                            [cases[4], radii[4]],
                        ]      
                    },
                    'circle-color': {
                        'property': 'cases',
                        'stops': [
                            [cases[0], colors[0]],
                            [cases[1], colors[1]],
                            [cases[2], colors[2]],
                            [cases[3], colors[3]],
                            [cases[4], colors[4]],
                        ]
                    },
                    'circle-stroke-color': 'dark red',
                    'circle-stroke-width': 1,
                    'circle-opacity': 0.5
                }
            });
        });

        map.on('click', 'earthquakes-point', (event) => {
            new mapboxgl.Popup()
                .setLngLat(event.features[0].geometry.coordinates)
                .setHTML(`<strong>Covid Cases:</strong> ${event.features[0].properties.cases}`)
                .addTo(map);
        });

        // Legend code
        // create legend object, it will anchor to the div element with the id legend.
        const legend = document.getElementById('legend');

        //set up legend cases and labels
        var labels = ['<strong>Size</strong>'], vbreak;
        //iterate through cases and create a scaled circle and label for each
        for (var i = 0; i < cases.length; i++) {
            vbreak = cases[i];
            // you need to manually adjust the radius of each dot on the legend 
            // in order to make sure the legend can be properly referred to the dot on the map.
            dot_radius = 2 * radii[i];
            labels.push(
                '<p class="break"><i class="dot" style="background:' + colors[i] + '; width: ' + dot_radius +
                'px; height: ' +
                dot_radius + 'px; "></i> <span class="dot-label" style="top: ' + dot_radius / 2 + 'px;">' + vbreak +
                '</span></p>');

        }

        const source =
            '<p style="text-align: right; font-size:10pt">Source: <a href="https://earthquake.usgs.gov/earthquakes/">USGS</a></p>';

        // combine all the html codes.
        legend.innerHTML = labels.join('') + source;

    </script>

</body>

</html>
